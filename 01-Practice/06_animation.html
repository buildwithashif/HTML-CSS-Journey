<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>

    <style>
        .box {
            height: 180px;
            width: 180px;
            background-color: black;
            transition: transform 0.5s ease-in, border-radius 0.8s ease;
            margin-top: 100px;
            margin-left: 100px;
        }

        .box:hover {
            transform: scale(1.5);
            background-color: brown;
            border-radius: 500px;
        }
    </style>
</head>
<body>
    <div class="box">
        BOX
    </div>
</body> 
</html>
