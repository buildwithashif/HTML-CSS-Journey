<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Practice</title>
</head>
<body>
    <div style="
      display: flex;
      margin-bottom: 30px;
      flex-direction: row;
    ">
        <div style="background-color: lightblue;">div 1 bro</div>
        <div style="background-color: blueviolet;">div 2</div>
    </div>

    <div style="
      display: flex;
      margin-bottom: 30px;
      flex-direction: row;
    ">
        <div style="background-color: lightblue;
        width: 100px;">100px</div>
        <div style="background-color: blueviolet;
        flex: 1;">flex 1</div>
    </div>

    <div style="
      display: flex;
      margin-bottom: 30px;
      flex-direction: row;
    ">
        <div style="background-color: blueviolet;
        flex: 1;">flex 1</div>
        <div style="background-color: lightblue;
        width: 100px;">100px</div>
        <div style="background-color: rgb(51, 132, 60);
        flex: 1;">flex 1</div>
    </div>

    <div style="
      display: flex;
      margin-bottom: 30px;
      flex-direction: row;
      height: 100px;
      background-color: antiquewhite;
      border: 1px solid black;
      justify-content: space-between;
    ">
        <div style="background-color: blueviolet;
        width: 100px;">flex 1</div>
        <div style="background-color: lightblue;
        width: 100px;">100px</div>
        <div style="background-color: rgb(51, 132, 60);
        width: 100px;">flex 1</div>
    </div>

    <div style="
      display: flex;
      margin-bottom: 30px;
      flex-direction: row;
      height: 100px;
      background-color: antiquewhite;
      border: 1px solid black;
      justify-content: space-between;
      align-items: center;
    ">
        <div style="background-color: blueviolet;
        width: 100px;">flex 1</div>
        <div style="background-color: lightblue;
        width: 100px;">100px</div>
        <div style="background-color: rgb(51, 132, 60);
        width: 100px;">flex 1</div>
    </div>
</body>
</html>
