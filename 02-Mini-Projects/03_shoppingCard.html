<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sale Card</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f2f2f2;
    }

    .card{
        width:320px;
        background:white;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,0.15);
        position:relative;
        transition:0.3s;
    }

    .card:hover{
        transform:translateY(-8px);
    }

    .sale-badge{
        position:absolute;
        top:15px;
        left:15px;
        background:#ff3b30;
        color:white;
        padding:6px 12px;
        border-radius:20px;
        font-size:14px;
        font-weight:bold;
    }

    .wishlist{
        position:absolute;
        top:15px;
        right:15px;
        width:40px;
        height:40px;
        background:white;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:20px;
        cursor:pointer;
        box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }

    .wishlist:hover{
        transform:scale(1.1);
    }

    .product-image{
        width:100%;
        height:220px;
        object-fit:cover;
    }

    .content{
        padding:20px;
    }

    .title{
        font-size:22px;
        margin-bottom:8px;
    }

    .rating{
        color:gold;
        margin-bottom:12px;
    }

    .price{
        margin-bottom:15px;
    }

    .old-price{
        text-decoration:line-through;
        color:gray;
        margin-right:10px;
    }

    .new-price{
        color:green;
        font-size:24px;
        font-weight:bold;
    }

    .description{
        color:#555;
        margin-bottom:20px;
        line-height:1.4;
    }

    .cart-btn{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#007bff;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .cart-btn:hover{
        background:#0056b3;
    }
</style>
</head>
<body>

<div class="card">

    <div class="sale-badge">70% OFF</div>

    <div class="wishlist">❤️</div>

    <img
    src="https://imgs.search.brave.com/REeQgX7G2VbuEbskbRQX0lM5i3NPFVQAMkGO3VAZTjg/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YS5nZXR0eWltYWdl/cy5jb20vaWQvOTA5/MjM4Mjg2L3Bob3Rv/L3JlZC13aXJlbGVz/cy1oZWFkcGhvbmVz/LmpwZz9zPTYxMng2/MTImdz0wJms9MjAm/Yz1mY3lTakhoXzBt/OFR5ZFM1eEVsSzR6/VWRycGFEdXZ6NGx1/Sm9ZNlNaT1RjPQ"
    alt="Headphones"
    class="product-image">

    <div class="content">

        <h2 class="title">Wireless Headphones</h2>

        <div class="rating">
            ⭐⭐⭐⭐⭐ (4.8)
        </div>

        <div class="price">
            <span class="old-price">₹3999</span>
            <span class="new-price">₹2799</span>
        </div>

        <p class="description">
            Premium wireless headphones with crystal clear sound,
            deep bass, and long battery life.
        </p>

        <button class="cart-btn">
            🛒 Add To Cart
        </button>

    </div>

</div>

</body>
</html>
