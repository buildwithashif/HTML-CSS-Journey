<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .navbar{
            height:40px;
            background-color: antiquewhite;
            position: fixed;
            width: 100%;
        }

        ul{
            display: flex;
            justify-content: space-around;
            list-style: none;
            padding-top: 10px;
            color: rgb(0, 0, 0);
        }

        .main{
            background-color: rgb(0, 0, 0);
            color: rgb(188, 178, 178);
            display: flex;
            height: 700px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .footer{
            background-color: aquamarine;
            height: 50px;
        }
        .chatbot{
            position: fixed;
            color: rgb(255, 0, 0);
            bottom: 70px;
            right: 15px;
            background-color: rgb(210, 206, 206);
            border: 3px solid chartreuse;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li>Home</li>
            <li>Blog</li>
            <li>Product</li>
            <li>Service</li>
            <li>Contact</li>
        </ul>
    </div>
    <div class="main">
        <h1>Welcome to the website</h1>
        <p>These are the description</p>
    </div>
    <div class="footer">

    </div>
    <div class="chatbot">O^O</div>
</body>
</html>
